<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <title>to syifa nabila</title>
</head>
<style>
     * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background: url('images/1.jpg') center/cover no-repeat;
    overflow: hidden;
}

header {
    position: sticky;
    top: 0;
    left: 0;
    width: 100%;
    padding: 1rem 3%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    background: url('img/pantai.jpg') center/cover no-repeat;
  
}

.header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(50px);
    z-index: -1;
}

.logo {
    font-size: 1.5rem;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
}

.navbar a {
    font-size: 1.15rem;
    color: #fff;
    text-decoration: none;
    font-weight: 500;
    margin-left: 2.5rem;
    border: 1px solid;
    padding-left: 15px;
    padding-right: 15px;
    padding-top: 8px;
    padding-bottom: 8px;
    width: 50px;
    border-radius: 20px;
}

.navbar a:hover {
    color: #000000;
    background-color: #fff;
}


    .hero-section {
        height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: #fff;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        animation: fade 2s ease;
    }

    @keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
    }

    .hero-section h1 {
        font-size: 2.5rem;
        margin-bottom: 20px;
    }

    .hero-section p {
        font-size: 1.2rem;
        margin-bottom: 30px;
    }

    .cta-button{
    background: linear-gradient(45deg,#ff9a9e,#fad0c4);
    color: white;
    padding: 12px 28px;
    border-radius: 30px;
    transition: 0.3s;
    text-decoration: none;
    
    }

.cta-button:hover{
    transform: scale(1.05);
}
footer {
    width: 100%;
    text-align: center;
    position: fixed;
    padding: 15px 0;
    bottom: 0;
    color: white;
}

@media (max-width: 992px) {
    .header {
        padding: 1.3rem 5%;
    }

    .logo{
        font-size: 1.3rem;
    }
    .icons {
        display: inline-flex;
    }

}

@media (max-width: 768px) {
    .logo {
        font-size: 1.3rem;
    }

    .icons {
        display: inline-flex;
    }




}
</style>
<body>
    <header class="header">
        <div class="logo"> To: Syifa Nabila/Ikan/Badak/Iblis.</div>
    </header>

    <div class="hero-section">
        <h1>Hai, Selamat Datang Ipullll</h1>
        <p>Saya ada surat untuk kamu</p>
        <p>kalo mau klik "Lanjut" kalo ga klik "Malas" oke</p>
        <a href="kenangan.html" class="cta-button">Lanjut</a>
        <a href="#" class="cta-button" id="malasBtn">Malas</a>
    </div>

    

    

    <footer>
        <div class="container">
            <small>&copy; From Ibna Aini 2026</small>
        </div>
    </footer>

    <script>
          const btn = document.getElementById("malasBtn");

function pindahTombol() {
    const maxX = window.innerWidth - btn.offsetWidth - 20;
    const maxY = window.innerHeight - btn.offsetHeight - 20;

    btn.style.position = "fixed";
    btn.style.left = Math.random() * maxX + "px";
    btn.style.top = Math.random() * maxY + "px";
}

// Desktop
btn.addEventListener("mouseenter", pindahTombol);

// HP
btn.addEventListener("touchstart", function(e){
    e.preventDefault(); // mencegah tombol terklik
    pindahTombol();
});
    </script>
  

</body>
</html>
